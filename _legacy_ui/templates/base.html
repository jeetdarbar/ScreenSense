<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenSense - Circadian Health</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- HTML2Canvas & jsPDF for Report Exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Custom transitions for smooth UI changes */
        body {
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Wind Down Mode Styles */
        .wind-down-active {
            filter: brightness(0.6) grayscale(20%);
            pointer-events: none;
            /* Lock main UI */
        }

        .wind-down-overlay {
            display: none;
            /* Hidden by default */
        }

        .wind-down-overlay.active {
            display: flex;
            pointer-events: auto;
            /* Allow interaction with overlay */
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-zinc-950 via-stone-900 to-zinc-950 text-stone-200 antialiased font-sans min-h-screen flex flex-col selection:bg-amber-500 selection:text-zinc-900">

    <nav class="bg-zinc-900/30 backdrop-blur-md border-b border-zinc-800 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1
                class="text-xl font-bold tracking-tight bg-gradient-to-r from-amber-200 to-stone-400 bg-clip-text text-transparent">
                ScreenSense</h1>
            <span class="text-xs font-mono text-amber-500/70 opacity-75">v3.0 // Biological UX</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto flex-grow p-4 md:p-6 w-full" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center p-6 text-xs text-gray-500">
        &copy; 2024 ScreenSense Prototype. <span class="opacity-50">Not a medical device.</span>
    </footer>

    <!-- Wind Down Protocol Overlay -->
    <div id="windDownOverlay"
        class="wind-down-overlay fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col items-center justify-center text-white"
        style="display: none;">
        <div class="max-w-md w-full p-8 text-center space-y-6">
            <h2 class="text-3xl font-light text-indigo-300">High Risk Detected</h2>
            <p class="text-lg opacity-80">Your circadian rhythm is under stress. Let's reset before you sleep.</p>

            <div id="windDownContent">
                <!-- Intervention Content Goes Here (Breathing/Journaling) -->
                <div class="p-6 border border-white/20 rounded-lg bg-white/5 backdrop-blur-sm">
                    <p class="mb-4">Take a deep breath...</p>
                    <div
                        class="w-24 h-24 rounded-full border-4 border-indigo-400 mx-auto animate-pulse flex items-center justify-center">
                        <span id="timerDisplay" class="text-2xl font-mono">05:00</span>
                    </div>
                </div>
            </div>

            <button id="completeInterventionBtn"
                class="mt-8 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-full transition hidden">
                I'm Ready to Sleep
            </button>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
