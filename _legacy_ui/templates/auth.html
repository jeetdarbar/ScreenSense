<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenSense - Authentication</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbars but keep ability to scroll if needed on small screens */
        body::-webkit-scrollbar {
            display: none;
        }

        body {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* Subtle pulse for focus glow */
        @keyframes subtle-pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.1);
            }

            50% {
                box-shadow: 0 0 20px 0 rgba(251, 191, 36, 0.2);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.1);
            }
        }

        .glowing-input:focus {
            animation: subtle-pulse 2s infinite;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-zinc-950 via-stone-900 to-zinc-950 min-h-screen text-stone-200 antialiased font-sans flex items-center justify-center p-4">

    <!-- Auth Card -->
    <div
        class="bg-gradient-to-br from-zinc-800/40 to-zinc-900/10 backdrop-blur-2xl border border-zinc-700/50 border-t-zinc-600/50 rounded-3xl shadow-2xl shadow-zinc-950/50 w-full max-w-md p-8 sm:p-10 relative overflow-hidden transition-all duration-500 ease-in-out">

        <!-- Decorative Glow -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-amber-500/10 rounded-full blur-3xl pointer-events-none">
        </div>
        <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-amber-600/5 rounded-full blur-3xl pointer-events-none">
        </div>

        <!-- Header -->
        <div class="text-center mb-8 relative z-10">
            <h1
                class="text-3xl font-bold text-amber-500 tracking-tight drop-shadow-[0_2px_10px_rgba(251,191,36,0.3)] mb-2">
                ScreenSense</h1>
            <p id="authSubtitle" class="text-sm font-medium text-stone-400">Welcome back. Enter your credentials to
                continue.</p>
        </div>

        <!-- Notification Banner (Hidden by default) -->
        <div id="authAlert"
            class="hidden mb-6 p-3 rounded-lg text-sm text-center border font-medium relative z-10 transition-all duration-300">
        </div>

        <!-- The Form -->
        <form id="authForm" onsubmit="handleAuth(event)" class="space-y-5 relative z-10" data-mode="login">

            <!-- Email Input -->
            <div>
                <label for="email"
                    class="block text-xs font-semibold text-stone-400 uppercase tracking-widest mb-2 pl-1">Email
                    Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-stone-500">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                            </path>
                        </svg>
                    </div>
                    <input type="email" id="email" required
                        class="w-full pl-11 pr-4 py-3 bg-zinc-950/50 border border-zinc-800 rounded-xl focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 outline-none text-amber-50 placeholder-stone-600 transition-all glowing-input shadow-inner"
                        placeholder="student@university.edu">
                </div>
            </div>

            <!-- Username Input (Hidden in Login Mode) -->
            <div id="usernameBox"
                class="hidden transition-all duration-500 opacity-0 -translate-y-4 h-0 overflow-hidden">
                <label for="username"
                    class="block text-xs font-semibold text-stone-400 uppercase tracking-widest mb-2 pl-1">Display
                    Name</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-stone-500">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <input type="text" id="username"
                        class="w-full pl-11 pr-4 py-3 bg-zinc-950/50 border border-zinc-800 rounded-xl focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 outline-none text-amber-50 placeholder-stone-600 transition-all glowing-input shadow-inner"
                        placeholder="John Doe">
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label for="password"
                    class="block text-xs font-semibold text-stone-400 uppercase tracking-widest mb-2 pl-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-stone-500">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                    </div>
                    <input type="password" id="password" required
                        class="w-full pl-11 pr-4 py-3 bg-zinc-950/50 border border-zinc-800 rounded-xl focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 outline-none text-amber-50 placeholder-stone-600 transition-all glowing-input shadow-inner"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full mt-6 bg-gradient-to-r from-amber-600 to-amber-500 text-zinc-950 py-3.5 rounded-xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-transform shadow-[0_0_20px_rgba(251,191,36,0.25)] hover:shadow-[0_0_25px_rgba(251,191,36,0.4)] flex justify-center items-center">
                <span>Sign In</span>
                <!-- Loading Spinner (Hidden) -->
                <svg id="loadingSpinner" class="animate-spin ml-2 h-5 w-5 text-zinc-950 hidden"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
            </button>
        </form>

        <!-- Toggle Text -->
        <div class="mt-8 text-center relative z-10">
            <p class="text-sm text-stone-500">
                <span id="toggleQuestion">Don't have an account?</span>
                <button onclick="toggleAuthMode()" id="toggleBtn"
                    class="text-amber-500 hover:text-amber-400 font-semibold transition-colors ml-1 focus:outline-none underline decoration-amber-500/30 hover:decoration-amber-400">
                    Create one
                </button>
            </p>
        </div>
    </div>

    <!-- Vanilla JS Logic -->
    <script>
        function toggleAuthMode() {
            const form = document.getElementById('authForm');
            const mode = form.getAttribute('data-mode');
            const usernameBox = document.getElementById('usernameBox');
            const usernameInput = document.getElementById('username');
            const submitBtnText = document.querySelector('#submitBtn span');
            const subtitle = document.getElementById('authSubtitle');
            const question = document.getElementById('toggleQuestion');
            const toggleBtn = document.getElementById('toggleBtn');
            const alertBox = document.getElementById('authAlert');

            // Hide any active alerts when switching modes
            alertBox.classList.add('hidden');

            if (mode === 'login') {
                // Switch to Register Mode
                form.setAttribute('data-mode', 'register');

                // Show username
                usernameBox.classList.remove('hidden');
                // Allow a tiny delay for display:block to apply before animating opacity
                setTimeout(() => {
                    usernameBox.classList.remove('opacity-0', '-translate-y-4', 'h-0');
                    usernameBox.classList.add('opacity-100', 'translate-y-0', 'h-[76px]');
                }, 10);

                usernameInput.setAttribute('required', 'true');

                // Update text elements
                submitBtnText.textContent = 'Create Account';
                subtitle.textContent = 'Begin your circadian reset journey today.';
                question.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign in here';

            } else {
                // Switch to Login Mode
                form.setAttribute('data-mode', 'login');

                // Hide username
                usernameBox.classList.remove('opacity-100', 'translate-y-0', 'h-[76px]');
                usernameBox.classList.add('opacity-0', '-translate-y-4', 'h-0');

                // Remove from DOM flow after animation finishes
                setTimeout(() => {
                    usernameBox.classList.add('hidden');
                }, 500);

                usernameInput.removeAttribute('required');

                // Update text elements
                submitBtnText.textContent = 'Sign In';
                subtitle.textContent = 'Welcome back. Enter your credentials to continue.';
                question.textContent = 'Don\'t have an account?';
                toggleBtn.textContent = 'Create one';
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const form = document.getElementById('authForm');
            const mode = form.getAttribute('data-mode');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;

            // UI elements for loading state
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.querySelector('#submitBtn span');
            const spinner = document.getElementById('loadingSpinner');
            const alertBox = document.getElementById('authAlert');

            // Disable button & show spinner
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            spinner.classList.remove('hidden');

            // Determine endpoint path
            const endpoint = mode === 'login' ? '/login' : '/register';

            // Prepare payload
            const payload = { email, password };
            if (mode === 'register') payload.username = username;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Redirect to the protected dashboard
                    window.location.href = '/dashboard';
                } else {
                    // Show error
                    showAlert(data.error || 'Authentication failed', 'error');
                    resetBtnState();
                }

            } catch (error) {
                showAlert('Network error occurred. Please try again.', 'error');
                resetBtnState();
            }

            function resetBtnState() {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                spinner.classList.add('hidden');
            }
        }

        function showAlert(msg, type) {
            const alertBox = document.getElementById('authAlert');
            alertBox.textContent = msg;
            alertBox.classList.remove('hidden', 'bg-red-500/20', 'text-red-400', 'border-red-500/30', 'bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');

            if (type === 'error') {
                alertBox.classList.add('bg-red-500/20', 'text-red-400', 'border-red-500/30');
            } else {
                alertBox.classList.add('bg-emerald-500/20', 'text-emerald-400', 'border-emerald-500/30');
            }
        }
    </script>
</body>

</html>
